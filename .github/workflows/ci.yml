name: CI

on:
  push:
    branches: [main, test]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: go test (${{ matrix.go }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Align with go.mod (1.20) + current LTS-ish + latest stable
        go: ["1.20.x", "1.24.x", "stable"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Test
        run: go test -count=1 ./...
      - name: Vet
        run: go vet ./...
      - name: Build nowhere-check
        run: go build -o /tmp/nowhere-check ./cmd/nowhere-check
      - name: Run nowhere-check
        run: /tmp/nowhere-check

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - name: Run staticcheck
        run: staticcheck ./...

  race:
    name: race and shuffle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: go test -race -shuffle=on -count=20 ./...

  fuzz:
    name: wire fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Auth
        run: go test ./wire -run=^$ -fuzz=^FuzzValidateAuthFrame$ -fuzztime=30s
      - name: Flow
        run: go test ./wire -run=^$ -fuzz=^FuzzReadFlowHeader$ -fuzztime=30s
      - name: Target
        run: go test ./wire -run=^$ -fuzz=^FuzzTarget$ -fuzztime=30s
      - name: UoT
        run: go test ./wire -run=^$ -fuzz=^FuzzReadUDPPacket$ -fuzztime=30s
      - name: DATAGRAM
        run: go test ./wire -run=^$ -fuzz=^FuzzDecodeUDPFrame$ -fuzztime=30s
