name: CI

on:
  push:
    branches: [main, test]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: go test (${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.20.x", "1.24.x", stable]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go test -count=1 ./...
      - run: go vet ./...
      - run: go build -o /tmp/nowhere-check ./cmd/nowhere-check
      - run: /tmp/nowhere-check

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - run: staticcheck ./...

  race:
    name: race and shuffle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: PR stress
        if: github.event_name != 'schedule'
        run: go test -race -shuffle=on -count=20 ./...
      - name: Nightly stress
        if: github.event_name == 'schedule'
        run: go test -race -shuffle=on -count=100 ./...

  fuzz:
    name: nightly wire fuzz smoke
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: go test ./wire -run=^$ -fuzz=FuzzValidateAuthFrame -fuzztime=30s
      - run: go test ./wire -run=^$ -fuzz=FuzzDecodeTCPRequest -fuzztime=30s
      - run: go test ./wire -run=^$ -fuzz=FuzzReadFlowHeader -fuzztime=30s
      - run: go test ./wire -run=^$ -fuzz=^FuzzDecodeUDPFrame$ -fuzztime=30s
      - run: go test ./wire -run=^$ -fuzz=^FuzzReadUOTFrame$ -fuzztime=30s
      - run: go test ./wire -run=^$ -fuzz=FuzzBuildEffectiveSpec -fuzztime=30s
